{{/*
Chart-managed Secret for any credential where the user set a plaintext
values.yaml apiKey (dev/local convenience) rather than existingSecretName.
Keys with an existingSecretName set are wired directly in deployment.yaml's
env instead, and are intentionally absent here.
*/}}
{{- $hasAny := or
  (and .Values.store.qdrant.apiKey (not .Values.store.qdrant.existingSecretName))
  (and .Values.embedder.openai.apiKey (not .Values.embedder.openai.existingSecretName))
  (and .Values.embedder.voyage.apiKey (not .Values.embedder.voyage.existingSecretName))
  (and .Values.embedder.cohere.apiKey (not .Values.embedder.cohere.existingSecretName))
-}}
{{- if $hasAny }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trelix.fullname" . }}
  labels:
    {{- include "trelix.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.store.qdrant.apiKey (not .Values.store.qdrant.existingSecretName) }}
  QDRANT_API_KEY: {{ .Values.store.qdrant.apiKey | quote }}
  {{- end }}
  {{- if and .Values.embedder.openai.apiKey (not .Values.embedder.openai.existingSecretName) }}
  OPENAI_API_KEY: {{ .Values.embedder.openai.apiKey | quote }}
  {{- end }}
  {{- if and .Values.embedder.voyage.apiKey (not .Values.embedder.voyage.existingSecretName) }}
  VOYAGE_API_KEY: {{ .Values.embedder.voyage.apiKey | quote }}
  {{- end }}
  {{- if and .Values.embedder.cohere.apiKey (not .Values.embedder.cohere.existingSecretName) }}
  COHERE_API_KEY: {{ .Values.embedder.cohere.apiKey | quote }}
  {{- end }}
{{- end }}
