[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trelix_llama_index"]

[project]
name = "trelix-llama-index"
version = "2.0.0"
description = "LlamaIndex retriever for trelix code intelligence"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["trelix>=0.4.0", "llama-index-core>=0.10.0"]

[project.urls]
Homepage = "https://github.com/sairam0424/trelix"
