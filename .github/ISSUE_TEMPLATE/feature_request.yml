---
name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to trelix!
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I often need to... but currently..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should trelix solve this?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Indexing / parsing
        - Retrieval / search quality
        - MCP server / tools
        - CLI / UX
        - Federation / multi-repo
        - LangChain / LlamaIndex integration
        - REST API
        - Documentation
        - Performance
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternatives exist today?
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
