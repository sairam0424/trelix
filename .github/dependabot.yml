version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns:
          - "ruff*"
          - "mypy*"
          - "pytest*"
          - "build*"
          - "twine*"
    ignore:
      # Ignore major version bumps — review manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # tree-sitter 0.22+ has breaking API changes — pin to <0.22 until all 20+ parsers are migrated
      - dependency-name: "tree-sitter"
        versions: [">=0.22"]
      - dependency-name: "tree-sitter-languages"
        versions: [">=2.0"]

  # trelix-mcp dependencies
  - package-ecosystem: "pip"
    directory: "/packages/trelix-mcp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    ignore:
      # Ignore major version bumps for Actions — review manually
      - dependency-name: "actions/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "softprops/action-gh-release"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pypa/gh-action-pypi-publish"
        update-types: ["version-update:semver-major"]
