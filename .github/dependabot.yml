version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns:
          - "ruff*"
          - "mypy*"
          - "pytest*"
          - "build*"
          - "twine*"
    ignore:
      # Ignore major version bumps — review manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # trelix-mcp dependencies
  - package-ecosystem: "pip"
    directory: "/packages/trelix-mcp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
