name: trelix PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  trelix-review:
    name: trelix Code Intelligence Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      checks: write
      contents: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install trelix
        run: pip install "trelix[local]" --quiet

      - name: Index repository
        run: trelix index .
        continue-on-error: true  # indexing may fail in restricted CI (model downloads, OOM)

      - name: Run trelix review
        id: review
        run: |
          # Only stdout is redirected — trelix review --json writes status/
          # progress messages to stderr and ONLY the JSON array to stdout
          # (see src/trelix/cli/main.py), so merging stderr in here would
          # corrupt the file again.
          trelix review --pr "${TRELIX_REPO}#${TRELIX_PR_NUMBER}" --json > /tmp/trelix-review.json 2>/tmp/trelix-review.stderr.log || true
          cat /tmp/trelix-review.stderr.log
          echo "review_file=/tmp/trelix-review.json" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRELIX_PR_NUMBER: ${{ github.event.pull_request.number }}
          TRELIX_REPO: ${{ github.repository }}

      - name: Post review as Check annotations
        uses: actions/github-script@v7
        env:
          TRELIX_PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            // Use a fixed, trusted path — never interpolate step outputs into JS source
            const reviewFile = '/tmp/trelix-review.json';
            // PR number comes from env, not directly from context expression in source
            const prNumber = parseInt(process.env.TRELIX_PR_NUMBER, 10);

            // trelix review --json emits a bare array of
            // {file, lines: "start-end", severity: "ERROR"|"WARN"|"INFO", comment}
            // — see src/trelix/cli/main.py's review() --pr --json path.
            let findings = [];
            try {
              const raw = fs.readFileSync(reviewFile, 'utf8');
              findings = JSON.parse(raw);
            } catch (e) {
              console.log('No structured review output:', e.message);
            }

            const annotations = findings.slice(0, 50).map(f => {
              const [startLine, endLine] = String(f.lines || '1-1').split('-').map(Number);
              return {
                path: f.file || 'unknown',
                start_line: startLine || 1,
                end_line: endLine || startLine || 1,
                annotation_level: f.severity === 'ERROR' ? 'failure'
                  : f.severity === 'WARN' ? 'warning' : 'notice',
                message: f.comment || String(f),
                title: 'trelix review',
              };
            });

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'trelix Code Review',
              head_sha: context.sha,
              status: 'completed',
              conclusion: annotations.some(a => a.annotation_level === 'failure')
                ? 'failure' : 'success',
              output: {
                title: `trelix found ${annotations.length} issue(s)`,
                summary: `trelix reviewed PR #${prNumber} and found ${annotations.length} issue(s).`,
                annotations,
              },
            });
