name: Helm Lint

on:
  push:
    branches: [main, develop]
    paths:
      - "helm/**"
      - ".github/workflows/helm-lint.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "helm/**"
      - ".github/workflows/helm-lint.yml"

jobs:
  lint:
    name: helm lint + template (backend=${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend: [sqlite, qdrant, lance]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "v3.16.2"

      - name: Helm lint
        run: helm lint helm/trelix

      - name: Helm template (backend=${{ matrix.backend }})
        run: |
          helm template test helm/trelix \
            --set store.backend=${{ matrix.backend }} \
            --set store.qdrant.apiKey=ci-test-placeholder

      - name: Helm template (ingress enabled)
        if: matrix.backend == 'sqlite'
        run: helm template test helm/trelix --set ingress.enabled=true
