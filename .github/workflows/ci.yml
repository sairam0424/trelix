name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project + dev deps
        run: pip install -e ".[local,dev]"
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: |
          ruff format src/ tests/
          git diff --exit-code -- src/ tests/ || (echo "ruff format changed files — commit the formatted output" && exit 1)
      - name: Mypy
        run: mypy src/trelix/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install trelix + dev deps
        run: pip install -e ".[local,dev]"
      - name: Install trelix-mcp + deps
        run: pip install -e packages/trelix-mcp
      - name: Locate tree-sitter grammar cache dir
        id: ts-cache
        run: echo "dir=$(python -c 'from tree_sitter_language_pack import cache_dir; print(cache_dir())')" >> "$GITHUB_OUTPUT"
      - name: Cache tree-sitter grammars
        uses: actions/cache@v4
        with:
          path: ${{ steps.ts-cache.outputs.dir }}
          key: tree-sitter-language-pack-${{ hashFiles('pyproject.toml') }}
      - name: Prefetch tree-sitter grammars
        run: python -c "from trelix.indexing.parser._grammar import prefetch_all; prefetch_all()"
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
      - name: Run trelix-mcp tests
        run: pytest packages/trelix-mcp/tests/ -v --tb=short
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build slim image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: EXTRAS=serve
          tags: trelix:ci-test
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify image runs
        run: docker run --rm trelix:ci-test --help
