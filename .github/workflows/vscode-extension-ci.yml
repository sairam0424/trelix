name: VS Code Extension CI

on:
  push:
    branches: [main, develop]
    paths:
      - "workspace-vscode/**"
      - ".github/workflows/vscode-extension-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "workspace-vscode/**"
      - ".github/workflows/vscode-extension-ci.yml"

jobs:
  test:
    name: Build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspace-vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build (tsc + esbuild)
        run: npm run build

      - name: Run tests (xvfb — VS Code test runner needs a display)
        run: xvfb-run -a npm test
